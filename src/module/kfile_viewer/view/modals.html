<template id="kfile-viewer-modals">
  <div>
    <!-- 新建文件夹 -->
    <div v-if="modalNewFolder" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" @click.self="closeNewFolderModal" @keydown.escape="closeNewFolderModal">
      <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-5 w-full max-w-sm" role="dialog" aria-modal="true" aria-labelledby="modal-new-folder-title">
        <h3 id="modal-new-folder-title" class="text-lg font-semibold text-slate-800 mb-3">新建文件夹</h3>
        <input ref="newFolderInputRef" v-model="newFolderName" type="text" placeholder="文件夹名称（不能含 /）" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none mb-4" @keydown.enter="submitNewFolder">
        <div class="flex justify-end gap-2">
          <button type="button" @click="closeNewFolderModal" class="px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 cursor-pointer text-sm">取消</button>
          <button type="button" @click="submitNewFolder" class="px-3 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 cursor-pointer text-sm">确定</button>
        </div>
      </div>
    </div>
    <!-- 新建文本文件 -->
    <div v-if="modalNewFile" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" @click.self="closeNewFileModal" @keydown.escape="closeNewFileModal">
      <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-5 w-full max-w-sm" role="dialog" aria-modal="true" aria-labelledby="modal-new-file-title">
        <h3 id="modal-new-file-title" class="text-lg font-semibold text-slate-800 mb-3">新建文本文件</h3>
        <input ref="newFileInputRef" v-model="newFileName" type="text" placeholder="文件名（如 readme.txt，不能含 /）" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none mb-4" @keydown.enter="submitNewFile">
        <div class="flex justify-end gap-2">
          <button type="button" @click="closeNewFileModal" class="px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 cursor-pointer text-sm">取消</button>
          <button type="button" @click="submitNewFile" class="px-3 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 cursor-pointer text-sm">确定</button>
        </div>
      </div>
    </div>
    <!-- 重命名 -->
    <div v-if="modalRename.show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" @click.self="closeRenameModal" @keydown.escape="closeRenameModal">
      <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-5 w-full max-w-sm" role="dialog" aria-modal="true" aria-labelledby="modal-rename-title">
        <h3 id="modal-rename-title" class="text-lg font-semibold text-slate-800 mb-3">重命名</h3>
        <input ref="renameInputRef" v-model="modalRename.newName" type="text" placeholder="新名称（不能含 /）" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none mb-4" @keydown.enter="submitRename">
        <div class="flex justify-end gap-2">
          <button type="button" @click="closeRenameModal" class="px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 cursor-pointer text-sm">取消</button>
          <button type="button" @click="submitRename" class="px-3 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 cursor-pointer text-sm">确定</button>
        </div>
      </div>
    </div>
    <!-- 删除确认 -->
    <div v-if="modalDelete.show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" @click.self="closeDeleteModal" @keydown.escape="closeDeleteModal">
      <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-5 w-full max-w-sm" role="dialog" aria-modal="true" aria-labelledby="modal-delete-title">
        <h3 id="modal-delete-title" class="text-lg font-semibold text-slate-800 mb-2">确认删除</h3>
        <p class="text-slate-600 text-sm mb-4">{{ modalDelete.isFolder ? '将删除该文件夹及其下所有内容。' : '将删除该文件。' }} 是否继续？</p>
        <div class="flex justify-end gap-2">
          <button type="button" @click="closeDeleteModal" class="px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 cursor-pointer text-sm">取消</button>
          <button type="button" @click="submitDelete" class="px-3 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 cursor-pointer text-sm">删除</button>
        </div>
      </div>
    </div>
    <!-- 上传进度 -->
    <div v-if="uploading" class="fixed bottom-4 right-4 z-50 bg-white rounded-xl shadow-xl border border-slate-200 p-4 w-72">
      <p class="text-sm font-medium text-slate-700 mb-1">上传中…</p>
      <p v-if="uploadTotal > 0" class="text-xs text-slate-500 mb-2 truncate" :title="uploadCurrentName">{{ uploadCurrentName || '' }} ({{ uploadCurrentIndex }}/{{ uploadTotal }})</p>
      <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
        <div class="h-full bg-indigo-600 transition-all duration-300" :style="{ width: uploadProgress + '%' }"></div>
      </div>
    </div>
  </div>
</template>
<script>
  defineComponent('kfile-viewer-modals', {
    template: '#kfile-viewer-modals',
    setup() {
      var store = inject('store');
      var Vue = window.Vue;
      if (Vue && Vue.ref && Vue.watch && Vue.nextTick) {
        var newFolderInputRef = Vue.ref(null), newFileInputRef = Vue.ref(null), renameInputRef = Vue.ref(null);
        Vue.watch(store.modalNewFolder, function (v) { if (v) Vue.nextTick(function () { var el = newFolderInputRef.value; if (el) el.focus(); }); });
        Vue.watch(store.modalNewFile, function (v) { if (v) Vue.nextTick(function () { var el = newFileInputRef.value; if (el) el.focus(); }); });
        Vue.watch(function () { return store.modalRename && store.modalRename.show; }, function (v) { if (v) Vue.nextTick(function () { var el = renameInputRef.value; if (el) el.focus(); }); });
        return Object.assign({}, store, { newFolderInputRef: newFolderInputRef, newFileInputRef: newFileInputRef, renameInputRef: renameInputRef });
      }
      return store;
    }
  })
</script>

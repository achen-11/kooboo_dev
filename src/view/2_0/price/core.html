<script env="server">
	var pricingPlans = k.content.Pricing.all()
	var faqItems = k.content.Faq.all()
</script>

<script env="client">
	document.addEventListener('DOMContentLoaded', function () {
		var cards = document.querySelectorAll('.price-plan-card')
		var faqs = document.querySelectorAll('.price-faq__item')

		function setFeatured(card) {
			cards.forEach(function (c) {
				c.classList.remove('price-plan-card--featured')
				var btn = c.querySelector('.price-plan-card__button')
				if (btn) btn.classList.remove('price-plan-card__button--primary')
				var arrow = c.querySelector('.featured-arrow')
				if (arrow) arrow.removeAttribute('hidden')
			})
			card.classList.add('price-plan-card--featured')
			var btn = card.querySelector('.price-plan-card__button')
			if (btn) btn.classList.add('price-plan-card__button--primary')
			var arrow = card.querySelector('.featured-arrow')
			if (arrow) arrow.setAttribute('hidden', '')
		}

		cards.forEach(function (card, index) {
			card.style.cursor = 'pointer'
			if (index === 1) setFeatured(card)
			card.addEventListener('click', function () { setFeatured(card) })
		})

		if (faqs.length > 0) {
			faqs[0].setAttribute('open', '')
		}
	})
</script>

<section class="price-page bg-[var(--color-white)]" aria-labelledby="price-title">
    <div class="price-plans site-container" aria-labelledby="price-title">
        <h1 id="price-title" class="price-page__title" k-label="Pricing">定价</h1>

        <div class="price-plan-grid" aria-label="Kooboo pricing plans">
            <article class="price-plan-card" k-for="plan in pricingPlans" repeat-self="true">
                <div class="price-plan-card__content">
                    <header class="price-plan-card__header">
                        <div class="price-plan-card__heading">
                            <img class="price-plan-card__icon" k-attribute="src plan.Icon" width="32" height="32" alt="" aria-hidden="true" />
                            <h2 k-content="plan.Title">Test</h2>
                        </div>
                        <p k-content="plan.Description">Discover what kooboo can do for you</p>
                    </header>

                    <p class="price-plan-card__price">
                        <span class="price-plan-card__amount" k-content="plan.Price">$ 9.9</span>
                        <span class="price-plan-card__period" k-label="/year">/年</span>
                    </p>

                    <a class="price-plan-card__button" href="/claim">
                        <span k-label="Get started">立即订阅</span>
                        <span class="featured-arrow" aria-hidden="true">&rarr;</span>
                    </a>

                    <ul class="price-plan-card__features" aria-label="Kooboo pricing plan features">
                        <li k-for="item in plan.Items" k-html="item" repeat-self="true">3 sites</li>
                    </ul>
                </div>
            </article>
        </div>
    </div>

    <div class="price-faq site-container" aria-labelledby="price-faq-title">
        <h2 id="price-faq-title" class="price-page__title">FAQ</h2>

        <div class="price-faq__list">
            <details class="price-faq__item" k-for="faq in faqItems" name="price-faq" repeat-self="true">
                <summary class="price-faq__summary">
                    <span k-content="faq.Title">How can you support high-performance sites for only $1/year?</span>
                    <span class="price-faq__marker" aria-hidden="true"></span>
                </summary>
                <div k-if="faq.Description" class="price-faq__panel">
                    <p k-content="faq.Description">Traditional platforms rely on heavy virtual machines or containers...</p>
                </div>
            </details>
        </div>
    </div>
</section>

<script env="server">
	var item = k.content.HomeBanner.all().find(o => o.PageName == "ecommerce");
	
	const ecommerceContent = k.content.EcommerceContent.all()
		.map(({ icon, title, EcommerceFeature = [] }) => ({
			url: JSON.parse(icon || '{}')?.src || '',
			title,
			ecommerceFeature: EcommerceFeature.map(({ title: featureTitle, EcommerceShopify = [], EcommerceKooboo = [], EcommerceShoplazza = [] }) => {
				const maxLen = Math.max(EcommerceShopify.length, EcommerceKooboo.length, EcommerceShoplazza.length, 1);
				return {
					title: featureTitle,
					rows: Array.from({ length: maxLen }, (_, i) => ({
						isFirst: i === 0,
						shopify: EcommerceShopify[i] || '',
						kooboo: EcommerceKooboo[i] || '',
						shoplazza: EcommerceShoplazza[i] || ''
					}))
				};
			})
		}));
	
	const titleContent = k.content.EcommerceTitle.all().map(item => {
		return {
			url: JSON.parse(item.icon).src,
			title: item.title
		}
	})
	if (item) {
		k.response.meta.title = "Kooboo " + item.Title;
		k.response.meta.setMeta("keywords", item.SubTitle);
		k.response.meta.setMeta("description", item.SubTitle);
	}
	
</script>

<script env="client">
	const main = document.getElementById('main');
	
	const sentinel = document.createElement('div');
	sentinel.style.height = '1px';
	main.parentNode.insertBefore(sentinel, main);
	
	const observer = new IntersectionObserver(
		([entry]) => {
			requestAnimationFrame(() => {
				if (!entry.isIntersecting) {
					main.classList.add('main-sticky');
				} else {
					main.classList.remove('main-sticky');
				}
			});
		},
		{
			rootMargin: '-64px 0px 0px 0px',
			threshold: [0]
		}
	);
	
	observer.observe(sentinel);
	
	
	const mobileContent = document.getElementById('mobile')
	const pcContent = document.getElementById('pc')
	
	function updateView() {
		if (window.innerWidth > 1024) {
			pcContent.style.display = 'block'
			mobileContent.style.display = 'none'
	
		} else {
			pcContent.style.display = 'none'
			mobileContent.style.display = 'block'
		}
	}
	
	// 页面加载时先执行一次
	updateView()
	
	// 监听窗口变化
	window.addEventListener('resize', updateView)
</script>

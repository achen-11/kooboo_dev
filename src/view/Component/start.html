<section class="bg-gray-300/30 md:flex mx-auto justify-between md:mb-40 max-w-screen-xl xl:rounded-lg py-10 px-6 lg:py-16 lg:mb-60 lg:px-24">
    <div class="basis-6/12 mb-8 md:mb-0">
        <h2 class="text-4xl lg:text-6xl mb-2" k-label="StartToday">从现在开始</h2>
        <p class="text-gray-500" k-label="StartTitle">只需要几分钟的时间，你就可以拥有自己的网站，可以是企业官网，电商网站或是各类集团内部应用</p>
        <div class="mt-8 flex flex-wrap items-center">
            <a env="server" class="group flex justify-center shadow-[0_0_0_1px_rgba(0,0,0,0.1)] w-full sm:w-fit bg-[#111a4a] items-center text-white rounded-lg py-3.5 px-6 transition-all hover:shadow-sm" :href="`/_start/login?lang=${k.request.culture}`">
                <span class="mr-1 leading-none" k-label="StartAction">快速建站</span>
                <svg viewBox="0 0 16 16" fill="none" class="-mr-1 inline-block h-4 stroke-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 13L13 8L8 3" stroke="white" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round" class="transition-transform -translate-x-1 group-hover:translate-x-0">
                    </path>
                    <path d="M12 8L2 8" stroke="white" stroke-width="1.5" class="transition-transform origin-left scale-0 group-hover:scale-100"></path>
                </svg>
            </a>
            <button class="flex justify-center cursor-pointer bg-white w-full mt-4 sm:w-fit sm:ml-3 sm:mt-0 items-center shadow-[0_0_0_1px_rgba(0,0,0,0.1)] rounded-lg py-3.5 px-6 transition-all hover:shadow-[0_0_2px_1px_rgba(0,0,0,0.2)]" onclick="toggleChat()">
                <span class="mr-1 leading-none" k-label="contactus">联系我们</span>
            </button>
        </div>
    </div>
    <ul class="basis-5/12 flex flex-col justify-between py-1">
        <li class="group px-6 py-4 rounded-lg transition-colors hover:bg-gray-500/10 hover:backdrop-blur-md hover:backdrop-saturate-100">
            <a class="flex items-center justify-between" href="/docs">
                <div class="flex items-start gap-2">
                    <img class="w-4 h-4 relative top-1" src="/products4.svg" alt="Document">
                    <div>
                        <h3 class="inline-block" k-label="StartDoc">文档</h3>
                        <p class="mt-1 text-sm" k-label="StartDocNote">查看我们的优势</p>
                    </div>
                </div>
                <svg viewBox="0 0 16 16" fill="none" class="-mr-1 inline-block h-4 stroke-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 13L13 8L8 3" stroke="black" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round" class="transition-transform -translate-x-1 group-hover:translate-x-0">
                    </path>
                    <path d="M12 8L2 8" stroke="black" stroke-width="1.5" class="transition-transform origin-left scale-0 group-hover:scale-100"></path>
                </svg>
            </a>
        </li>
        <li class="group px-6 py-4 rounded-lg transition-colors hover:bg-gray-500/10 hover:backdrop-blur-md hover:backdrop-saturate-100">
            <a class="flex items-center justify-between" href="/pricing">
                <div class="flex items-start gap-2">
                    <img class="w-4 h-4 relative top-1" src="/products6.svg" alt="Pricing">
                    <div>
                        <h3 class="inline-block" k-label="StartPrice">价格</h3>
                        <p class="mt-1 text-sm" k-label="StartPriceNote">从免费开始，以成本计价</p>
                    </div>
                </div>
                <svg viewBox="0 0 16 16" fill="none" class="-mr-1 inline-block h-4 stroke-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 13L13 8L8 3" stroke="black" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round" class="transition-transform -translate-x-1 group-hover:translate-x-0">
                    </path>
                    <path d="M12 8L2 8" stroke="black" stroke-width="1.5" class="transition-transform origin-left scale-0 group-hover:scale-100"></path>
                </svg>
            </a>
        </li>
    </ul>
</section>
